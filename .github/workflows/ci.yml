name: Stage 1 CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rokit 1.2.0
        shell: bash
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/rojo-rbx/rokit/3b803035635c29c752f6ea1d2befc1473b96c51a/scripts/install.sh | bash -s -- 1.2.0

      - name: Install pinned tools
        run: rokit install --no-trust-check

      - name: Report tool versions
        run: |
          rokit --version
          rojo --version
          stylua --version
          selene --version
          wally --version

      - name: Check formatting
        run: stylua --check src tests

      - name: Lint Luau
        run: selene src tests

      - name: Run Stage 1 structural tests
        shell: pwsh
        run: ./scripts/Test-Stage1.ps1

      - name: Build Rojo project
        run: |
          mkdir -p build
          rojo build -o build/StartupStudioTycoon.rbxl
